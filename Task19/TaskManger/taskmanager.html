<!DOCTYPE html>
<html>

<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .box {
            background: white;
            width: 400px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        button,
        select {
            padding: 8px;
            margin: 5px;
        }

        button {
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0 38%;
            width: 300px;
        }

        li {
            background: #eee;
            margin: 5px 0;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Task Manager</h2>

        <!-- Input -->
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>

        <!-- Filter Buttons -->
        <div>
            <button onclick="filterTasks('all')">All</button>
            <button onclick="filterTasks('completed')">Completed</button>
            <button onclick="filterTasks('pending')">Pending</button>
        </div>

        <!-- Task List where tasks will be added-->
        <ul id="taskList"></ul> 
    </div>

    <script src="taskmanger.js"></script>
</body>

</html>
