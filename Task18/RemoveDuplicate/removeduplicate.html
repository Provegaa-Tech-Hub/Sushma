<!DOCTYPE html>
<html>

<head>
    <title>
        Remove Duplicate
    </title>

    <style>
        button {
            padding: 8px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .output {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>Remove Duplicate</h3>
        <input type="text" id="inputArray" placeholder="Enter the values(1,2,2,3....)" />
        <button onclick="removeDuplicate()">Remove</button>
        <div class="output" id="result"></div>
    </div>




    <script src="removeduplicate.js"></script>
</body>

</html>
