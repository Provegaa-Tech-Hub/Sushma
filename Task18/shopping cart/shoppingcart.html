<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        Shopping Cart
    </title>
    <style>
          button {
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
           .product {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px;
            width: 250px;
        }
    </style>
</head>

<body>
    <h1>Shopping Cart</h1>
    <div class="product">
        <h3>Product 1</h3>
        <p>Price: ₹100</p>
        <button onclick="addtocart(100)">ADD</button>
    </div>
    <div class="product">
        <h3>Product 2</h3>
        <p>Price: ₹200</p>
        <button onclick="addtocart(200)">ADD</button>
    </div>
    <div class="product">
        <h3>Product 3</h3>
        <p>Price: ₹300</p>
        <button onclick="addtocart(300)">ADD</button>
    </div>

    <h2>Total Items:<span id="items">0</span></h2>
    <h2>Total Price: ₹<span id="total">0</span></h2>

    <script src="shoppingcart.js"></script>
</body>

</html>
