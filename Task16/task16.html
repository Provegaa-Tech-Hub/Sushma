<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        javascript concepts
    </title>

</head>

<body>
    <h2>Phone Number Clean</h2>
    <input type="number" id="phonecleaned" placeholder="Enter Phonenumber">
    <button onclick="cleannumber()">Clean</button>
    <h3 id="output"></h3>


    <h2> Password Strength</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkpassword()">Check</button>
    <h3 id="strength"></h3>

    <h2>HighLight Search</h2>
    <input type="text" id="search" placeholder="Search..." onkeyup="highlight()">
    <!-- <button onclick="highlighttext()">Search</button> -->
    <p id="text">JavaScript is a powerful language. Learning JavaScript helps you build web apps.</p>

    <style>
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>

    <h2> Digital Clock</h2>
    <h1 id="clock"></h1>


    <h2>Timer</h2>
    <h1 id="timer">0</h1>

    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>



    <h2>Date Formatting</h2>
    <button onclick="showdate()">Show Date</button>
    <p id="result"></p>


    <h2>Order ID Parsing</h2>
    <input type="text" id="orderId" placeholder="Enter Order ID">
    <button onclick="orderIdCheck()">Check</button>
    <p id="parseresult"></p>





    <script src="task16.js"></script>
</body>

</html>
