<!DOCTYPE html>
<html>

<head>
    <title>
        My Web App
    </title>
    <link rel="stylesheet" href="styles/Webappstyles.css" >
</head>

<body>
    <div class="header">
        My Web App
    </div>
    <div class="navbar">
        <a class="styles"  href="#">Home</a>
        <a class="styles" href="dashboard.html">Dashboard</a>
        <a class="styles" href="contact.html" >Contact</a>
    </div>
    <div class="display_flex">
        <div class="container_welcome">
            <div class="welcome_content">
                <label class="welcome_label">
                    Welcome
                </label>
                <br>
                <span class="welcome_span">
                    This is your design template
                </span>
                <br>
                <button class="welcome_clickme" onclick="document.location='welcome.html'">
                    Click Me
                </button>
            </div>
        </div>
        <div class="container_login">
            <div class="welcome_content">
                <label class="login-label">
                    Login
                </label>
                <br>
                <input type="username" id="username" placeholder="username" class="login_textbox">
                <br>
                <input type="password" id="password" placeholder="password" class="login_textbox">
                <br>
                <button class="login_login" onclick="document.location='welcome.html'">
                    Login
                </button>
            </div>

        </div>
    </div>
    <div class="footer">
        <a class="styles">
            © 2026 My App
        </a>

    </div>
</body>

</html>
